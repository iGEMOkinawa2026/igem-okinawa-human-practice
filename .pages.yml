media:
  input: public/media
  output: /media

content:
  - name: activities
    label: Activities / Highlights
    type: collection
    path: src/content/activities
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
      sort:
        - order
        - title
      default:
        sort: order
        order: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: title_ja
        label: Title (Japanese)
        type: string
        required: false
      - name: description_ja
        label: Description (Japanese)
        type: text
        required: false
      - name: image
        label: Image
        type: image
        required: false
      - name: imagePlaceholder
        label: Image placeholder (no image)
        type: string
        required: false
      - name: imagePlaceholder_ja
        label: Image placeholder (Japanese)
        type: string
        required: false
      - name: order
        label: Sort order
        type: number
        required: false

  - name: sponsors
    label: Sponsors
    type: collection
    path: src/content/sponsors
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: name
      sort:
        - order
        - name
      default:
        sort: order
        order: asc
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: name_ja
        label: Name (Japanese)
        type: string
        required: false
      - name: logo
        label: Logo
        type: image
        required: false
      - name: tier
        label: Tier
        type: select
        required: true
        options:
          values:
            - name: gold
              label: Gold
            - name: silver
              label: Silver
            - name: bronze
              label: Bronze
            - name: partner
              label: Partner
      - name: order
        label: Sort order
        type: number
        required: false

  - name: archive
    label: Archive entries
    type: collection
    path: src/content/archive
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
      sort:
        - year
        - order
      default:
        sort: year
        order: desc
    fields:
      - name: year
        label: Year
        type: number
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: title_ja
        label: Title (Japanese)
        type: string
        required: false
      - name: summary
        label: Summary
        type: text
        required: true
      - name: summary_ja
        label: Summary (Japanese)
        type: text
        required: false
      - name: wiki_url
        label: Wiki URL
        type: string
        required: false
      - name: universities
        label: Universities
        type: text
        required: false
      - name: order
        label: Sort order (within year)
        type: number
        required: false

  - name: human-practice
    label: Human Practice Sections
    type: collection
    path: src/content/human-practice
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: title
      sort:
        - order
        - title
      default:
        sort: order
        order: asc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: title_ja
        label: Title (Japanese)
        type: string
        required: false
      - name: description
        label: Description
        type: text
        required: false
      - name: description_ja
        label: Description (Japanese)
        type: text
        required: false
      - name: sectionSlug
        label: URL Slug
        type: string
        required: true
      - name: order
        label: Sort order
        type: number
        required: false

  - name: project
    label: Projects
    type: collection
    path: src/content/project
    format: yaml-frontmatter
    filename: "{year}.md"
    view:
      primary: year
      sort:
        - year
      default:
        sort: year
        order: desc
    fields:
      - name: year
        label: Year
        type: number
        required: true
      - name: title
        label: Title
        type: string
        required: true
      - name: title_ja
        label: Title (Japanese)
        type: string
        required: false
      - name: summary
        label: Summary
        type: text
        required: true
      - name: summary_ja
        label: Summary (Japanese)
        type: text
        required: false
      - name: description
        label: Description
        type: text
        required: false
      - name: description_ja
        label: Description (Japanese)
        type: text
        required: false
      - name: wiki_url
        label: Wiki URL
        type: string
        required: false
      - name: image
        label: Image
        type: image
        required: false

  - name: members
    label: Team Members
    type: collection
    path: src/content/members
    format: yaml-frontmatter
    filename: "{primary}.md"
    view:
      primary: name
      sort:
        - order
        - name
      default:
        sort: order
        order: asc
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: name_ja
        label: Name (Japanese)
        type: string
        required: false
      - name: role
        label: Role
        type: string
        required: true
      - name: role_ja
        label: Role (Japanese)
        type: string
        required: false
      - name: team
        label: Team
        type: select
        required: true
        options:
          values:
            - name: wet
              label: Wet Lab
            - name: dry
              label: Dry Lab
            - name: human practice
              label: Human Practice
            - name: funding
              label: Funding
            - name: wiki-video
              label: Wiki & Video
      - name: institution
        label: Institution
        type: string
        required: false
      - name: institution_ja
        label: Institution (Japanese)
        type: string
        required: false
      - name: image
        label: Image
        type: image
        required: false
      - name: order
        label: Sort Order
        type: number
        required: false

  - name: settings
    label: Global Settings
    type: file
    path: src/data/settings.yaml
    format: yaml
    fields:
      - name: current_year
        label: Current Project Year
        type: number
        required: true
